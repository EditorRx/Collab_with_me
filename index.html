<!DOCTYPE html>
<html>
<head>
  <title>Collab Business</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    #chatBox {
      height: 70vh;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      width: fit-content;
      max-width: 70%;
    }

    .me {
      background: #00c6ff;
      color: black;
      margin-left: auto;
    }

    .user {
      background: rgba(255,255,255,0.2);
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: rgba(0,0,0,0.3);
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 20px;
      border: none;
      background: #00c6ff;
      color: black;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>🚀 Collab Business</header>

<div id="chatBox"></div>

<div id="inputArea">
  <input id="msg" placeholder="Type your message..." />
  <button onclick="send()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const chatBox = document.getElementById("chatBox");

  const myId = Math.random().toString(36).substring(7);

  function addMessage(data) {
    const div = document.createElement("div");
    div.classList.add("msg");

    if (data.id === myId) {
      div.classList.add("me");
    } else {
      div.classList.add("user");
    }

    div.innerText = `User-${data.id.slice(0,4)}: ${data.text}`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  socket.on("loadMessages", (msgs) => {
    msgs.forEach(addMessage);
  });

  socket.on("receiveMessage", (data) => {
    addMessage(data);
  });

  function send() {
    const input = document.getElementById("msg");
    if (input.value.trim() === "") return;

    socket.emit("sendMessage", {
      id: myId,
      text: input.value
    });

    input.value = "";
  }
</script>

</body>
</html>
